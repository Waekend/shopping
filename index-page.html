<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lanvin Curb - Weekend shopping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=BBH+Bogle&family=Rubik+Mono+One&display=swap" rel="stylesheet">    
    <link rel="stylesheet" href="../pages/style.css"> 
</head>
<body class="dark-theme">
    <header class="header">
        <div class="container">
            <div class="header-top">
                <div class="logo">WEEKEND SHOPPING</div>
                <div class="user-tools">
                    <div class="lang-switch">
                        <a href="#" class="lang-link active">RU</a>
                        <span style="opacity:0.3; color: var(--text);">|</span>
                        <a href="#" class="lang-link">KZ</a>
                    </div>
                    <div class="theme-switch" id="theme-toggle">
                        <div class="switch-circle"></div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="product-container">
            <div class="product-gallery">
                <div class="gallery-main">
                    <img src="./img/Jar.jpg" id="main-img" alt="Product">
                </div>
                <div class="gallery-thumbs">
                    <img src="./img/Jar.jpg" class="thumb" onclick="changeImg(this.src)">
                    <img src="./img/Jar.jpg" class="thumb" onclick="changeImg(this.src)">
                    <img src="./img/Jar.jpg" class="thumb" onclick="changeImg(this.src)">
                </div>
            </div>
            <div class="product-details">
                <h1 class="info-title">АМ АМ АМ</h1>
                <p class="brand" data-ru="Бренд: Lanvin" data-kz="Бренд: Lanvin">Бренд:ЭЛДЖЕЙНОСТЬ</p>
                <p class="price">25 890 ₸</p>
                <div class="info-desc" 
                    data-ru="Кроссовки с массивным дизайном, широкими шнурками и невероятным комфортом." 
                    data-kz="Массивті дизайнды, кең баулы және өте ыңғайлы кроссовкалар.">
                67
                </div>
                <a href="https://wa.me/" class="wa-button">WhatsApp</a>
            </div>
        </div>
    </main>
    
    <script>
        const btn = document.getElementById('theme-toggle');
        btn.onclick = () => document.body.classList.toggle('dark-theme');

        function changeImg(src) {
            document.getElementById('main-img').src = src;
        }

        const langLinks = document.querySelectorAll('.lang-link');
        const transElements = document.querySelectorAll('[data-ru]');
        langLinks.forEach(link => {
            link.onclick = (e) => {
                e.preventDefault();
                langLinks.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
                const lang = link.innerText.toLowerCase();
                transElements.forEach(el => {
                    el.innerText = el.getAttribute(`data-${lang}`);
                });
            };
        });
    </script>
